groups:
  - name: agents-secure-binding-manager-alerts
    rules:
      # Service Down Alert - Primary method using up metric
      - alert: AgentsSecureBindingManagerDown
        expr: up{job="agents-secure-binding-manager"} == 0
        for: 1m
        labels:
          severity: critical
          service: agents-secure-binding-manager
        annotations:
          summary: "Agents Secure Binding Manager service is down"
          description: "Agents Secure Binding Manager service has been down for more than 1 minute. Instance: {{ $labels.instance }}"

      # Alternative: No metrics received (for cases where up metric might not be reliable)
      - alert: AgentsSecureBindingManagerNoMetrics
        expr: absent(up{job="agents-secure-binding-manager"})
        for: 2m
        labels:
          severity: critical
          service: agents-secure-binding-manager
        annotations:
          summary: "No metrics received from Agents Secure Binding Manager"
          description: "No metrics have been received from Agents Secure Binding Manager for more than 2 minutes"

      # Health endpoint specific alert (if you expose health as a metric)
      - alert: AgentsSecureBindingManagerUnhealthy
        expr: health_check{job="agents-secure-binding-manager"} == 0
        for: 30s
        labels:
          severity: warning
          service: agents-secure-binding-manager
        annotations:
          summary: "Agents Secure Binding Manager health check failing"
          description: "Agents Secure Binding Manager health check has been failing for more than 30 seconds. Instance: {{ $labels.instance }}"

      # High latency alert
      - alert: AgentsSecureBindingManagerHighLatency
        expr: histogram_quantile(0.95, rate(agents_secure_binding_manager_latency_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: agents-secure-binding-manager
        annotations:
          summary: "Agents Secure Binding Manager high latency"
          description: "Agents Secure Binding Manager 95th percentile latency is above 2 seconds for more than 5 minutes. Current value: {{ $value }}s"

      # High error rate alert
      - alert: AgentsSecureBindingManagerHighErrorRate
        expr: rate(agents_secure_binding_manager_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: agents-secure-binding-manager
        annotations:
          summary: "Agents Secure Binding Manager high error rate"
          description: "Agents Secure Binding Manager error rate is above 10% for more than 2 minutes. Current rate: {{ $value }}"
